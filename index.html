<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moldura #EuTôComACris</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Montserrat,sans-serif;background:linear-gradient(160deg,#0F1F4A 0%,#1D2D6B 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
  .header{text-align:left;margin-bottom:16px;padding:0 4px}
  .header .eu-to{
    font-weight:600;
    font-size:.65rem;
    color:rgba(255,255,255,0.55);
    letter-spacing:5px;
    text-transform:uppercase;
    margin-bottom:6px;
    margin-top:8px
  }
  .header h1{
    font-weight:900;
    font-size:2.8rem;
    color:#ffffff;
    line-height:0.92;
    letter-spacing:-2px;
    text-transform:uppercase;
    margin:0;
    text-shadow:0 2px 20px rgba(0,0,0,0.3);
    -webkit-text-stroke:0.4px rgba(255,255,255,0.6)
  }
  .divider{
    width:48px;
    height:2px;
    background:#e8612a;
    margin:10px 0;
    border-radius:2px
  }
  .cargo{
    color:rgba(255,255,255,0.6);
    font-size:.68rem;
    font-weight:500;
    letter-spacing:0.8px;
    margin:0;
    text-transform:uppercase
  }
  .card{background:linear-gradient(180deg,#1a2860 0%,#1D2D6B 60%);border-radius:18px;padding:22px 18px;width:100%;max-width:360px;border:1px solid rgba(255,255,255,0.12);box-shadow:0 16px 56px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,0.06);display:flex;flex-direction:column;align-items:center}
  canvas#main{display:block;width:300px;height:300px;margin-bottom:18px}
  #fileInput{display:none}
  .btn{width:100%;padding:14px;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;border:none;margin-bottom:10px;transition:all .2s;letter-spacing:0.5px}
  .btn-primary{background:#e8612a;color:#fff}
  .btn-primary:hover{background:#d4521f}
  .btn-secondary{background:transparent;color:#e8612a;border:2px solid #e8612a;display:none}
  hr{border:none;border-top:1px solid rgba(255,255,255,0.1);width:100%;margin:14px 0}
  .hashtag{color:#F26A2E;font-weight:800;font-size:1.0rem;letter-spacing:-0.1px}
  .sub{color:#BFC9E8;font-size:.72rem;margin-top:5px;text-align:center;font-weight:500;letter-spacing:0.1px}
</style>
</head>

</div>

  <hr>

</div>

let loaded=0;
function onLoad(){ loaded++; if(loaded>=2) render(document.getElementById('main').getContext('2d')); }
crisImg.onload=onLoad; homemImg.onload=onLoad;

document.getElementById('fileInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const i=new Image();
    i.onload=()=>{
      userImg=i;
      document.getElementById('btnDown').style.display='block';
      render(document.getElementById('main').getContext('2d'));
      render(document.getElementById('export').getContext('2d'));
    };
    i.src=ev.target.result;
  };
  rd.readAsDataURL(f);
});

function drawCircleContent(ctx){
  // Gradiente de céu limpo e elegante
  const skyGrad=ctx.createLinearGradient(CX,CY-R,CX,CY+R*0.3);
  skyGrad.addColorStop(0,'#7bb8d4');
  skyGrad.addColorStop(0.6,'#a8d4e8');
  skyGrad.addColorStop(1,'#c8e8f4');
  ctx.fillStyle=skyGrad;
  ctx.fillRect(CX-R,CY-R,R*2,R*2);

  // Nuvem elegante — apenas branco limpo
  function cloud(cx,cy,scale){
    ctx.fillStyle='rgba(255,255,255,0.95)';
    [[0,0,28],[22,-8,22],[42,0,18],[-20,2,16]].forEach(([dx,dy,r])=>{
      ctx.beginPath();ctx.arc(cx+dx*scale,cy+dy*scale,r*scale,0,Math.PI*2);ctx.fill();
    });
  }
  cloud(230,CY-105,1);

  // Colinas — tom institucional, não cartoon
  const hillGrad=ctx.createLinearGradient(0,CY+30,0,CY+R);
  hillGrad.addColorStop(0,'#4a9e6b');
  hillGrad.addColorStop(1,'#3a8558');
  ctx.fillStyle=hillGrad;
  ctx.beginPath();
  ctx.arc(160,CY+R*0.6,R*0.65,Math.PI,0);ctx.fill();

  const hillGrad2=ctx.createLinearGradient(0,CY+40,0,CY+R);
  hillGrad2.addColorStop(0,'#3d8f5e');
  hillGrad2.addColorStop(1,'#2d7048');
  ctx.fillStyle=hillGrad2;
  ctx.beginPath();
  ctx.arc(350,CY+R*0.65,R*0.58,Math.PI,0);ctx.fill();
}

function render(ctx){
  ctx.clearRect(0,0,S,S);

  // CAMADA 1: Fundo azul único
  ctx.fillStyle='#1D2D6B';
  ctx.fillRect(0,0,S,S);

  // CAMADA 2: Círculo
  ctx.save();
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.clip();
  if(userImg){
    const sc=Math.max((R*2)/userImg.width,(R*2)/userImg.height);
    ctx.drawImage(userImg,CX-userImg.width*sc/2,CY-userImg.height*sc/2,userImg.width*sc,userImg.height*sc);
  }else{
    drawCircleContent(ctx);
  }
  ctx.restore();

  // Borda do círculo — laranja único, limpo
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle='#e8612a';ctx.lineWidth=9;ctx.stroke();

  // CAMADA 3: Faixa laranja — curva suave
  ctx.fillStyle='#e8612a';
  ctx.beginPath();
  ctx.moveTo(0,345);
  ctx.quadraticCurveTo(250,315,500,335);
  ctx.lineTo(500,500);
  ctx.lineTo(0,500);
  ctx.closePath();
  ctx.fill();

  // CAMADA 4: David (atrás, direita)
  if(crisImg.complete&&crisImg.naturalWidth>0){
    const cH4=286, cW4=cH4*(crisImg.width/crisImg.height);
    ctx.drawImage(crisImg, S-cW4+47, S-cH4, cW4, cH4);
  }

  // CAMADA 5: Homem (frente, centro-direita)
  if(homemImg.complete&&homemImg.naturalWidth>0){
    const hH5=232, hW5=hH5*(homemImg.width/homemImg.height);
    ctx.drawImage(homemImg, S-hW5-90, S-hH5+8, hW5, hH5);
  }

  // CAMADA 6: Tipografia — faixa laranja, CENTRALIZADA
  // Centro horizontal do vão esquerdo (x=0~185): CX_TEXT = 92
  // Centro vertical da faixa (y=330~500): CY_TEXT = 415
  (function(){
    ctx.save();

    // ── área segura: x=0~185 (antes das pessoas) ──
    const AREA_X1 = 0;
    const AREA_X2 = 185;
    const CX_TEXT = (AREA_X1 + AREA_X2) / 2; // 92.5

    // ── faixa laranja: y≈330~500 ──
    const FAIXA_TOP = 332;
    const FAIXA_BOT = 500;
    const CY_FAIXA  = (FAIXA_TOP + FAIXA_BOT) / 2; // 416

    // ── calcular tamanho do nome ──
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'alphabetic';

    let fs = 30;
    ctx.font = '900 ' + fs + 'px Montserrat,Arial';
    while(ctx.measureText('CRIS PAIVA').width > AREA_X2 - 16 && fs > 12){
      fs--;
      ctx.font = '900 ' + fs + 'px Montserrat,Arial';
    }

    // ── alturas do bloco ──
    const eyebrowH  = 12;
    const gap1      = 5;
    const nameH     = fs;
    const gap2      = 5;
    const dividerH  = 1;
    const gap3      = 8;
    const sub1H     = 8;
    const sub2H     = 8;
    const totalH    = eyebrowH + gap1 + nameH + gap2 + dividerH + gap3 + sub1H + 8 + sub2H;

    // topo do bloco para centralizar verticalmente na faixa
    const blockTop = CY_FAIXA - totalH / 2;

    let yy = blockTop + eyebrowH;

    // EU TÔ COM A
    ctx.font          = '700 8.2px Montserrat,Arial';
    ctx.fillStyle     = 'rgba(255,255,255,0.90)';
    ctx.letterSpacing = '2px';
    ctx.fillText('EU TÔ COM A', CX_TEXT, yy);
    ctx.letterSpacing = '0px';
    yy += gap1 + nameH;

    // CRIS PAIVA
    ctx.font = '900 ' + fs + 'px Montserrat,Arial';
    ctx.shadowColor   = 'rgba(0,0,0,0.25)';
    ctx.shadowOffsetY = 1;
    ctx.shadowBlur    = 2;
    ctx.fillStyle = '#ffffff';
    ctx.fillText('CRIS PAIVA', CX_TEXT, yy);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    yy += gap2;

    // linha divisória
    const lineW = Math.min(ctx.measureText('CRIS PAIVA').width, AREA_X2 - 20);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(CX_TEXT - lineW/2, yy, lineW, 1);
    yy += gap3;

    // subtítulo
    ctx.font      = '500 8px Montserrat,Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.letterSpacing = '0.3px';
    ctx.fillText('Para Deputada Federal', CX_TEXT, yy);
    yy += 10;
    ctx.fillText('no Amazonas', CX_TEXT, yy);

    ctx.restore();
  })();



}

function baixar(){
  render(document.getElementById('export').getContext('2d'));
  const a=document.createElement('a');
  a.download='eu-to-com-cris-paiva.png';
  a.href=document.getElementById('export').toDataURL('image/png');
  a.click();
}

render(document.getElementById('main').getContext('2d'));
</script>
