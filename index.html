document.getElementById('fileInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const i=new Image();
    i.onload=()=>{
      userImg=i;
      document.getElementById('btnDown').style.display='block';
      render(document.getElementById('main').getContext('2d'));
      render(document.getElementById('export').getContext('2d'));
    };
    i.src=ev.target.result;
  };
  rd.readAsDataURL(f);
});

function clip(ctx){ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.clip();}

function render(ctx){
  ctx.clearRect(0,0,S,S);

  // 1. Foto do apoiador
  ctx.save();clip(ctx);
  if(userImg){
    const sc=Math.max((R*2)/userImg.width,(R*2)/userImg.height);
    ctx.drawImage(userImg,CX-userImg.width*sc/2,CY-userImg.height*sc/2,userImg.width*sc,userImg.height*sc);
  }else{
    ctx.fillStyle='#1a3a6e';ctx.fillRect(0,0,S,S);
    ctx.fillStyle='rgba(90,126,168,0.3)';
    ctx.beginPath();ctx.arc(CX,CY-30,50,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(CX,CY+100,80,Math.PI,0);ctx.fill();
  }
  ctx.restore();

  // 2. Faixa azul
  ctx.save();clip(ctx);
  ctx.fillStyle='#0e1e4a';
  ctx.fillRect(0,FAIXA_Y,S,FAIXA_H);
  ctx.restore();

  // 3. Linha laranja
  ctx.save();clip(ctx);
  ctx.fillStyle='#e8612a';
  ctx.fillRect(0,FAIXA_Y,S,4);
  ctx.restore();

  // 4. Bordas
  anel(ctx,CX,CY,R+5,'#e8612a',7);
  anel(ctx,CX,CY,R+14,'#0d1e3f',8);
  anel(ctx,CX,CY,R+22,'#e8612a',6);

  // 5. Foto da Cris — com clip circular
  if(crisImg.complete&&crisImg.naturalWidth>0){
    ctx.save();clip(ctx);
    ctx.drawImage(crisImg,CRIS_X,CRIS_Y,CRIS_W,CRIS_H);
    ctx.restore();
  }

  // 6. Textos
  ctx.save();clip(ctx);
  ctx.textAlign='center';ctx.textBaseline='alphabetic';

  ctx.font='600 14px Montserrat,Arial';
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText('EU TÔ COM A',TC,FAIXA_Y+26,TW);

  ctx.font='900 28px Montserrat,Arial';
  ctx.fillStyle='#fff';
  ctx.fillText('CRIS PAIVA',TC,FAIXA_Y+58,TW);

  ctx.fillStyle='#e8612a';
  ctx.fillRect(TC-30,FAIXA_Y+63,60,3);

  ctx.font='600 10px Montserrat,Arial';
  ctx.fillStyle='#fff';
  ctx.fillText('PARA DEPUTADA FEDERAL',TC,FAIXA_Y+78,TW);
  ctx.fillText('DO AMAZONAS',TC,FAIXA_Y+92,TW);

  ctx.restore();
}

function anel(ctx,x,y,r,c,lw){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.stroke();
}

function baixar(){
  render(document.getElementById('export').getContext('2d'));
  const a=document.createElement('a');
  a.download='eu-to-com-cris-paiva.png';
  a.href=document.getElementById('export').toDataURL('image/png');
  a.click();
}

crisImg.onload=()=>render(document.getElementById('main').getContext('2d'));
render(document.getElementById('main').getContext('2d'));
</script>
